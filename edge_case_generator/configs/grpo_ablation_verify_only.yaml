seed: 17
debug: false

model:
  type: template_policy

dataset:
  path: edge_case_generator/data/demo_dataset.jsonl
  split:
    train: 0.67
    val: 0.0
    test: 0.33
  subset: null

execution:
  timeout_sec: 1.0
  python_executable: python3

sampling:
  group_size: 8
  temperature: 1.0
  top_p: 1.0
  max_len: 256

rl:
  algorithm: grpo
  num_iterations: 8
  learning_rate: 0.35
  baseline_momentum: 0.9

grpo:
  advantage_normalization: std_normalized
  eps: 1.0e-8

reward:
  verify_weight: 6.0
  newfreq_weight: 0.0
  length_efficiency_weight: 0.0
  duplicate_weight: 0.0
  newfreq:
    allocation: inverse_frequency
  length_efficiency:
    enabled: false
    mode: inverse_normalized_length
    min_length: 1
    target_length: 12
    max_length: 256
    eps: 1.0e-8
  duplicate:
    check_group_duplicates: false
    check_replay_duplicates: false
    check_recent_history: false

buffer:
  path: outputs/grpo_verify_only/replay_buffer.jsonl
  recent_window_size: 100

output:
  dir: outputs/grpo_verify_only
  checkpoint_every: 2

logging:
  level: INFO
